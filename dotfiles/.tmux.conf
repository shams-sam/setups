# remap prefix from 'C-b' to 'C-]'
unbind C-b
set-option -g prefix C-]
bind-key C-] send-prefix

# Enable mouse mode (tmux 2.1 and above)
# set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Use zsh as default shell
set -g default-command "exec zsh"

# True color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# statusbar
set -g status-position bottom
set -g status-justify left

# Remove ESC delay
set-option -g repeat-time 0

# Removes ESC delay
set -sg escape-time 0

# Remove Auto-rename
set-option -g allow-rename off

# Emacs-style
set -g mode-keys emacs
set -g status-keys emacs

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Per-pane Claude Code idle indicator
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #(~/.tmux/claude-status.sh #{pane_id}) "
set -g status-interval 5

# Scratchpad — persists across popup toggles (emacs stays alive)
bind-key S display-popup -w 80% -h 80% -E "tmux new-session -A -s scratch 'emacs -nw ~/scratchpad.org'"

# List of plugins
set -g @tpm_plugins '                     \
    caiogondim/maglev                     \
    tmux-plugins/tpm                      \
    tmux-plugins/tmux-sensible            \
    tmux-plugins/tmux-resurrect           \
    tmux-plugins/tmux-continuum           \
    tmux-plugins/tmux-yank                \
    tmux-plugins/tmux-pain-control        \
    tmux-plugins/tmux-copycat             \
    # tmux-plugins/tmux-open              \ # requires xdg-open; not useful on headless servers
    tmux-plugins/tmux-battery             \
    tmux-plugins/tmux-cpu                 \
    tmux-plugins/tmux-prefix-highlight    \
'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Window-level claude idle indicator — appended to status-right after tpm
# #() in window-status-format doesn't work (expanded via #{T:}, not top-level)
# So we call the script from status-right; it renames windows as a side effect
set -ga status-right "#(~/.tmux/claude-window-status.sh)"
